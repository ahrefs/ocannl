name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5.4.x
          dune-cache: true
          allow-prerelease-opam: true

      - name: Setup project
        run: |
          opam pin -n .
          opam install . -y --deps-only --with-test --with-doc

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1.0.159
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read
          
          # Optional: Trigger when specific user is assigned to an issue
          assignee_trigger: "claude-bot"
          
          claude_args: |
            --model "opus"
            --system-prompt "The OCANNL build system and dependencies are already installed; you can verify this by running `opam switch`, and `dune build @check` or `opam exec -- dune build @check`."
            --allowedTools "Bash(opam:*),Bash(dune:*),Bash(git checkout:*),Bash(find:*),Bash(grep:*),Bash(ls:*),Bash(cat:*),Bash(mv:*),Bash(cp:*),Bash(cc:*),Bash(git check-ignore:*),Bash(git config:*)"
          
          # Optional: Custom environment variables for Claude
          # claude_env: |
          #   NODE_ENV: test

