name: Claude Code Review

on:
  pull_request:
    types: [opened, ready_for_review, review_requested]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'
    
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5.4.x
          dune-cache: true
          allow-prerelease-opam: true

      - name: Setup project
        run: |
          opam pin -n .
          opam install . -y --deps-only --with-test --with-doc

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1.0.159
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          
          claude_args: |
            --model "opus"
            --allowedTools "Bash(opam:*),Bash(dune:*),Bash(git checkout:*),Bash(find:*),Bash(grep:*),Bash(ls:*),Bash(cat:*),Bash(mv:*),Bash(cp:*),Bash(cc:*),Bash(git check-ignore:*),Bash(git config:*)"
          
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this PR for bugs and shortcomings.
            The OCANNL build system and dependencies are already installed;
            you can verify this by running `opam switch`, and `dune build @check` or `opam exec -- dune build @check`.
